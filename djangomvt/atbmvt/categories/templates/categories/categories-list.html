{% extends "layout.html" %}
{% load static %}
{% block content %}

<div class="container pt-4">
    <div class="row">
        {% for item in items %}
        <div class="col-6 col-md-4 col-xl-3 mb-4">
            <div class="card h-100 shadow">
                {% if item.image %}
                    <img src="{% static 'categories/' %}{{ item.image }}" class="card-img-top" alt="{{ item.image }}">
                {% endif %}
                <div class="card-body d-flex flex-column">
                    <div class="text-center mb-2 pb-1 border-bottom border-2">
                        <h5 class="card-title fw-bold">{{ item.name }}</h5>
                        <p class="card-text mb-0">{{ item.description|truncatewords:10 }}</p>
                    </div>
                    <div class="mt-auto">
                        <p class="fw-bold text-primary mb-0">{{ item.slug }}</p>
                    </div>
                </div>
                
            </div>
        </div>
        {% empty %}
            <div class="text-center pb-2">
                <h2>Записів поки що немає.</h2>
            </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
